<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amrit Hotel | VIP Dining</title>
    <link rel="stylesheet" href="style.css">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="#carousel" class="css-logo">
                <span class="logo-letter">A</span>mrit<span class="crown">♕</span>
            </a>
            <ul class="nav-links">
                <li><a href="#carousel">Specialties</a></li>
                <li><a href="#order">Order</a></li>
                <li><a href="#contacts">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <!-- Section 1: Carousel -->
        <section id="carousel" class="section-container">
            <h2 class="section-title">Royal Specialties</h2>
            <div class="carousel-wrapper">
                <div class="carousel-track">
                    <div class="carousel-card"><h3>Shahi Paneer</h3></div>
                    <div class="carousel-card"><h3>Daal Makhani</h3></div>
                    <div class="carousel-card"><h3>Special Lassi</h3></div>
                    <div class="carousel-card"><h3>Premium Raita</h3></div>
                    <!-- Cloned for loop -->
                    <div class="carousel-card"><h3>Shahi Paneer</h3></div>
                    <div class="carousel-card"><h3>Daal Makhani</h3></div>
                    <div class="carousel-card"><h3>Special Lassi</h3></div>
                    <div class="carousel-card"><h3>Premium Raita</h3></div>
                </div>
            </div>
        </section>

        <!-- Section 2: Order Form -->
        <section id="order" class="section-container">
            <h2 class="section-title">Digital Concierge</h2>
            <div class="glass-panel form-container">
                <form id="whatsapp-form">
                    
                    <div class="menu-category">
                        <div class="cat-header">
                            <i data-lucide="utensils" class="icon-gold"></i>
                            <h3 class="category-title">Sabzi</h3>
                        </div>
                        <div class="menu-item">
                            <label class="checkbox-container">
                                <input type="checkbox" name="foodItem" value="Shahi Paneer">
                                <span class="checkmark"></span> Shahi Paneer
                            </label>
                            <select class="qty-select" id="qty-Shahi-Paneer">
                                <option value="Half">Half</option>
                                <option value="Full">Full</option>
                            </select>
                        </div>
                        <div class="menu-item">
                            <label class="checkbox-container">
                                <input type="checkbox" name="foodItem" value="Daal Makhani">
                                <span class="checkmark"></span> Daal Makhani
                            </label>
                            <select class="qty-select" id="qty-Daal-Makhani">
                                <option value="Half">Half</option>
                                <option value="Full">Full</option>
                            </select>
                        </div>
                    </div>

                    <div class="menu-category">
                        <div class="cat-header">
                            <i data-lucide="wheat" class="icon-gold"></i>
                            <h3 class="category-title">Sides & Breads</h3>
                        </div>
                        <div class="menu-item">
                            <label class="checkbox-container"><input type="checkbox" name="foodItem" value="Tava Roti"><span class="checkmark"></span> Tava Roti</label>
                            <input type="number" class="qty-number" id="qty-Tava-Roti" min="1" value="1">
                        </div>
                        <div class="menu-item">
                            <label class="checkbox-container"><input type="checkbox" name="foodItem" value="Butter Roti"><span class="checkmark"></span> Butter Roti</label>
                            <input type="number" class="qty-number" id="qty-Butter-Roti" min="1" value="1">
                        </div>
                    </div>

                    <button type="submit" class="btn-3d">
                        <i data-lucide="send"></i> Send Order to WhatsApp
                    </button>
                </form>
            </div>
        </section>

        <!-- Section 3: Contacts -->
        <section id="contacts" class="section-container">
            <div class="glass-panel contact-card">
                <div class="css-logo" style="font-size: 3rem; margin-bottom: 2rem;">
                    <span class="logo-letter">A</span>mrit<span class="crown">♕</span>
                </div>
                
                <div class="social-links">
                    <a href="https://wa.me/919680346002" class="social-btn"><i data-lucide="phone"></i> WhatsApp</a>
                    <a href="#" class="social-btn"><i data-lucide="instagram"></i> Instagram</a>
                    <a href="#" class="social-btn"><i data-lucide="map-pin"></i> Suratgarh</a>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
